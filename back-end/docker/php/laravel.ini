; Laravel-focused PHP overrides for local Docker dev on PHP 8.4+

[PHP]
memory_limit = 512M
max_execution_time = 120
max_input_time = 120
post_max_size = 120M
upload_max_filesize = 120M
variables_order = EGPCS

[Date]
date.timezone = UTC

[Session]
; Keep defaults from PHP 8.4 for session ID format to avoid deprecated directives.
session.use_strict_mode = 1

[opcache]
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0

