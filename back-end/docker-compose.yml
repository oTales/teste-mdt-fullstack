services:
  app:
    container_name: mdt
    build: .
    restart: unless-stopped
    volumes:
      - ./:/var/www
      - ./.docker/bash:/commandhistory
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5173:5173"
      - "8080:8080"
    networks:
      - mdt_net
    extra_hosts:
      - "host.docker.internal:127.0.0.1"
      - "host.docker.internal:host-gateway"
    environment:
      PHP_IDE_CONFIG: "serverName=docker-mdt"

  nginx:
    container_name: nginx-mdt
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "8009:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/:/etc/nginx/conf.d/
    networks:
      - mdt_net

  mysql:
    container_name: mysql-mdt
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - ./.docker/mysql/dbdata:/var/lib/mysql
    ports:
      - "3310:3306"
    networks:
      - mdt_net
    command: --bind-address=0.0.0.0 --innodb_fast_shutdown=0
    stop_grace_period: 60s
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    container_name: redis-mdt
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./.docker/redis/data:/data
    networks:
      - mdt_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      retries: 3
      timeout: 5s

  mailhog:
    container_name: mailhog-mdt
    image: mailhog/mailhog
    platform: linux/amd64
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
        - mdt_net

networks:
  mdt_net:
    driver: bridge
